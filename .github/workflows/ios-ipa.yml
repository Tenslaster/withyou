name: iOS IPA (unsigned / no Apple Dev)

on:
  workflow_dispatch:
  push:
    paths:
      - "withyou-app/**"
      - ".github/workflows/ios-ipa.yml"

jobs:
  build-ipa:
    runs-on: macos-15
    timeout-minutes: 120
    defaults:
      run:
        working-directory: withyou-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: withyou-app/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Expo prebuild iOS
        env:
          EXPO_PUBLIC_WITHYOU_API: https://crew.kingdom.forum/withyou
        run: npx expo prebuild --platform ios --no-install --non-interactive

      - name: Pod install
        working-directory: withyou-app/ios
        run: pod install

      - name: Build archive (no codesign)
        working-directory: withyou-app/ios
        run: |
          set -euo pipefail
          ls -la
          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -n 1)
          echo "WORKSPACE=$WORKSPACE"
          xcodebuild -list -workspace "$WORKSPACE"
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['workspace']['schemes'][0])")
          echo "SCHEME=$SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/WithYou.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            archive

      - name: Pack unsigned IPA
        working-directory: withyou-app/ios
        run: |
          set -euo pipefail
          mkdir -p Payload
          APP=$(find build/WithYou.xcarchive/Products/Applications -name "*.app" | head -n 1)
          echo "APP=$APP"
          cp -R "$APP" Payload/
          zip -r WithYou-unsigned.ipa Payload
          ls -la WithYou-unsigned.ipa
          cp WithYou-unsigned.ipa ../WithYou-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WithYou-ipa
          path: withyou-app/WithYou-unsigned.ipa
          if-no-files-found: error

# DISABLED — free CI cannot produce a reliable Sideloadly IPA (Xcode/signing failures
# spammed GitHub email). Do NOT re-enable without a paid Apple Developer account
# or a known-good local Xcode archive.
#
# Use the WithYou PWA instead (no IPA, no CI, no emails):
#   https://crew.kingdom.forum/withyou
#   iPhone Safari → Share → Add to Home Screen
#
# Android APK remains available via android-apk.yml and dist/WithYou.apk

name: iOS IPA (DISABLED)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type ENABLE to attempt IPA build (will fail without Apple certs)"
        required: true
        default: "no"

jobs:
  skipped:
    runs-on: ubuntu-latest
    steps:
      - name: IPA workflow permanently skipped
        run: |
          echo "iOS IPA CI is disabled to stop failure emails."
          echo "Install on iPhone via PWA: https://crew.kingdom.forum/withyou"
          echo "Safari → Share → Add to Home Screen"
          if [ "${{ github.event.inputs.confirm }}" != "ENABLE" ]; then
            echo "Not building. Set confirm=ENABLE only if you know what you are doing."
            exit 0
          fi
          echo "ENABLE set but no IPA build steps remain. Use PWA or paid Apple Dev + EAS."
          exit 1

name: iOS IPA (unsigned / no Apple Dev)

on:
  workflow_dispatch:
  push:
    paths:
      - "withyou-app/**"
      - ".github/workflows/ios-ipa.yml"

jobs:
  build-ipa:
    runs-on: macos-15
    timeout-minutes: 120
    defaults:
      run:
        working-directory: withyou-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: withyou-app/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Expo prebuild iOS
        env:
          EXPO_PUBLIC_WITHYOU_API: https://crew.kingdom.forum/withyou
        run: npx expo prebuild --platform ios --no-install --non-interactive

      - name: Pod install
        working-directory: withyou-app/ios
        run: pod install

      - name: Build archive (no codesign)
        working-directory: withyou-app/ios
        env:
          EXPO_PUBLIC_WITHYOU_API: https://crew.kingdom.forum/withyou
        run: |
          set -euo pipefail
          export NODE_BINARY="$(command -v node)"
          echo "NODE_BINARY=$NODE_BINARY"
          ls -la
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          echo "WORKSPACE=$WORKSPACE"
          xcodebuild -list -workspace "$WORKSPACE"
          # Prefer app scheme WithYou (not Pods like EXConstants)
          SCHEME="WithYou"
          if ! xcodebuild -list -workspace "$WORKSPACE" -json | grep -q "\"$SCHEME\""; then
            SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json | python3 -c "import sys,json; d=json.load(sys.stdin); ss=d['workspace']['schemes']; print(next((s for s in ss if 'WithYou' in s and 'Pods' not in s), ss[0]))")
          fi
          echo "SCHEME=$SCHEME"
          set -o pipefail
          # Ad-hoc identity "-" lets ExpoModulesJSI scripts run without a paid Apple team.
          # Sideloadly will re-sign for device install.
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/WithYou.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            archive 2>&1 | tee /tmp/xcodebuild.log | tail -n 100
          if [ ! -d "$PWD/build/WithYou.xcarchive" ]; then
            echo "==== FULL ERROR SNIPPET ===="
            grep -E "error:|❌|failed" /tmp/xcodebuild.log | tail -n 40 || true
            exit 1
          fi

      - name: Pack unsigned IPA
        working-directory: withyou-app/ios
        run: |
          set -euo pipefail
          mkdir -p Payload
          APP=$(find build/WithYou.xcarchive/Products/Applications -name "*.app" | head -n 1)
          echo "APP=$APP"
          test -n "$APP"
          cp -R "$APP" Payload/
          zip -qry WithYou-unsigned.ipa Payload
          ls -la WithYou-unsigned.ipa
          cp WithYou-unsigned.ipa ../WithYou-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WithYou-ipa
          path: withyou-app/WithYou-unsigned.ipa
          if-no-files-found: error

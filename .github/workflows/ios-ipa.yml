name: iOS IPA (Sideloadly / free Apple ID re-sign)

# Produces an IPA. Install with Sideloadly using a FREE Apple ID (no $99 program).
# Apple does not allow real-device IPAs with zero Apple identity at all.

on:
  workflow_dispatch:
  push:
    paths:
      - "withyou-app/**"
      - ".github/workflows/ios-ipa.yml"

jobs:
  build-ipa:
    runs-on: macos-15
    timeout-minutes: 120
    defaults:
      run:
        working-directory: withyou-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: withyou-app/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Expo prebuild iOS
        env:
          EXPO_PUBLIC_WITHYOU_API: https://crew.kingdom.forum/withyou
        run: npx expo prebuild --platform ios --no-install --non-interactive

      - name: Patch Podfile — disable code signing on all pods (free-sign friendly)
        working-directory: withyou-app/ios
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path("Podfile")
          t = p.read_text()
          patch = '''
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
                config.build_settings['ENABLE_BITCODE'] = 'NO'
              end
            end
          '''
          # Inject before the last `end` of post_install if present, else append post_install
          if "post_install do |installer|" in t and patch.strip() not in t:
              # insert after post_install do |installer|
              t = t.replace(
                  "post_install do |installer|",
                  "post_install do |installer|\n" + patch,
                  1,
              )
              p.write_text(t)
              print("Patched existing post_install")
          elif "post_install do |installer|" not in t:
              t += f"\n\npost_install do |installer|\n{patch}\nend\n"
              p.write_text(t)
              print("Appended post_install")
          else:
              print("Patch already present or structure unknown")
          PY

      - name: Pod install
        working-directory: withyou-app/ios
        run: pod install

      - name: xcodebuild archive (signing disabled for Sideloadly re-sign)
        working-directory: withyou-app/ios
        env:
          EXPO_PUBLIC_WITHYOU_API: https://crew.kingdom.forum/withyou
        run: |
          set -euo pipefail
          export NODE_BINARY="$(command -v node)"
          export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME="WithYou"
          echo "WORKSPACE=$WORKSPACE SCHEME=$SCHEME NODE=$NODE_BINARY"
          # Disable user script sandbox that breaks Expo module scripts on CI
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/WithYou.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            ONLY_ACTIVE_ARCH=NO \
            archive 2>&1 | tee /tmp/xcodebuild.log | tail -n 120
          if [ ! -d "$PWD/build/WithYou.xcarchive" ]; then
            echo "==== errors ===="
            grep -E "error:|❌" /tmp/xcodebuild.log | tail -n 50 || true
            exit 1
          fi

      - name: Pack IPA for Sideloadly
        working-directory: withyou-app/ios
        run: |
          set -euo pipefail
          mkdir -p Payload
          APP=$(find build/WithYou.xcarchive/Products/Applications -name "*.app" | head -n 1)
          echo "APP=$APP"
          cp -R "$APP" Payload/
          zip -qry WithYou-for-Sideloadly.ipa Payload
          ls -la WithYou-for-Sideloadly.ipa
          cp WithYou-for-Sideloadly.ipa ../WithYou-for-Sideloadly.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: WithYou-ipa-sideloadly
          path: withyou-app/WithYou-for-Sideloadly.ipa
